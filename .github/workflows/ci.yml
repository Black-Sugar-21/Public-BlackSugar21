name: CI — Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'

jobs:
  backend-tests:
    name: Backend offline test suite (865+ assertions, 4 files)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run offline test suite (4 static suites, 865+ assertions)
        run: npm test
        # Pure static-analysis tests across 4 files:
        #   - test-comprehensive-300.js   (333 asserts — regex, sanitization,
        #                                    guards, clamping, i18n, safety)
        #   - test-post-deploy-350.js     (394 asserts — code patterns,
        #                                    RAG/Coach/Moderation/Places config)
        #   - test-discovery-v2-parity.js (111 asserts — orientation, userType,
        #                                    reviewer bypass, gender_mismatch,
        #                                    super-like, real-data simulation)
        #   - test-situation-sim.js       (27 asserts — 10-language directives,
        #                                    edge cases, XSS/SQL/RTL handling)
        #
        # All read lib/*.js with fs.readFileSync + regex checks — no Firebase
        # Admin SDK or Gemini API init, so the job needs zero secrets and
        # runs in < 15 seconds. Exit code 1 on any failure blocks merge.

      - name: Report test summary
        if: always()
        run: |
          echo "## Backend Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $?" >> $GITHUB_STEP_SUMMARY
