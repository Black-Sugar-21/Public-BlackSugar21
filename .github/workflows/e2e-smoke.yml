name: E2E Smoke — Production Regression Gate

# Pings deployed CFs + Firestore + RC + RAG + multiverse cache with real
# credentials. Runs:
#   1) manually via workflow_dispatch (pre-release sanity)
#   2) nightly at 07:00 UTC (04:00 CLT) to catch quiet regressions
#
# Required repo secrets:
#   FIREBASE_SERVICE_ACCOUNT_BLACK_SUGAR_21   Firebase admin SDK JSON
#   GEMINI_API_KEY                            Google AI Studio key
#   REVIEWER_UID  (optional)                  defaults to dverdugo85
#
# If any test fails, the job exits 1. Hook into Slack/Discord via
# actions/github-script if you want alerts.

on:
  workflow_dispatch:
  schedule:
    # 07:00 UTC nightly (after the dailyAIHealthCheck scheduled CF at 05:00 UTC)
    - cron: '0 7 * * *'

jobs:
  smoke:
    name: E2E smoke (Firestore + RC + RAG)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLACK_SUGAR_21 }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_BLACK_SUGAR_21 is not configured. Add it in repo settings before enabling this workflow."
            exit 1
          fi
          printf '%s' "$SA_JSON" > /tmp/sa.json
          test -s /tmp/sa.json

      - name: Run E2E smoke suite
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          GOOGLE_CLOUD_PROJECT: black-sugar21
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REVIEWER_UID: ${{ secrets.REVIEWER_UID }}
        run: node test-e2e-smoke.js

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa.json

      - name: Report
        if: always()
        run: |
          echo "## E2E Smoke Summary" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
